maintenance:
  description: "Phased update sequence for the agent ecosystem."
  phases:
    - name: "Phase 1: GitHub Pipelines"
      phase: 1
      projects:
        - "pipelines"
      wait_minutes: 12
    - name: "Phase 2: Epistemic Graph"
      phase: 2
      projects:
        - "epistemic-graph"
      wait_minutes: 12
    - name: "Phase 3: Core Tools and UIs"
      phase: 3
      projects:
        - "universal-skills"
        - "skill-graphs"
        - "agent-webui"
        - "agent-terminal-ui"
      wait_minutes: 12
    - name: "Phase 4: agent-utilities"
      phase: 4
      projects:
        - "agent-utilities"
      wait_minutes: 12
    - name: "Phase 5: Agents"
      phase: 5
      bulk_bump: True
      bulk_push: True
services:
  description: "Declares all active containerized services deployed on the Swarm, including their Git sources and LAN domains."
  items:
    - name: "keycloak"
      url: "http://gitlab.arpa/homelab/containers/services/keycloak.git"
      domain: "keycloak.arpa"
      description: "Local identity and access management system (OIDC/SAML SSO)."
    - name: "openbao"
      url: "http://gitlab.arpa/homelab/containers/services/openbao.git"
      domain: "openbao.arpa"
      description: "Secure secrets engine and root of trust vault."
    - name: "twenty"
      url: "http://gitlab.arpa/homelab/containers/services/twenty.git"
      domain: "twenty.arpa"
      description: "Specialized CRM solution for the customer relationship lifecycle."
    - name: "erpnext"
      url: "http://gitlab.arpa/homelab/containers/services/erpnext.git"
      domain: "erpnext.arpa"
      description: "Enterprise Resource Planning and management system."
    - name: "plane"
      url: "http://gitlab.arpa/homelab/containers/services/plane.git"
      domain: "plane.arpa"
      description: "Enterprise-grade issue tracking and project management platform."
    - name: "lgtm"
      url: "http://gitlab.arpa/homelab/containers/services/lgtm.git"
      domain: "grafana.arpa"
      description: "Observability stack comprising Prometheus, Grafana, Alertmanager, and Loki."
    - name: "uptime-kuma"
      url: "http://gitlab.arpa/homelab/containers/services/uptime-kuma.git"
      domain: "uptime.arpa"
