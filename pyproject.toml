[build-system]
requires = ["setuptools>=64.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "repository-manager"
version = "1.3.55"
description = "Manage your git projects"
readme = "README.md"
classifiers = [ "Development Status :: 5 - Production/Stable", "License :: Public Domain", "Environment :: Console", "Operating System :: POSIX :: Linux", "Programming Language :: Python :: 3",]
requires-python = ">=3.11"
dependencies = [ "agent-utilities[mcp]>=0.2.31",]
[[project.authors]]
name = "Audel Rouhi"
email = "knucklessg1@gmail.com"

[project.license]
text = "MIT"

[project.optional-dependencies]
mcp = [ "agent-utilities[mcp]>=0.2.31",]
agent = [ "agent-utilities[agent,logfire,graph]>=0.2.40", "pre-commit>=4.5.1", "bump2version>=1.0.1",]
all = [ "repository-manager[agent,mcp]>=1.3.55",]
test = [ "pytest", "pytest-asyncio",]

[project.scripts]
repository-manager = "repository_manager.repository_manager:main"
repository-manager-mcp = "repository_manager.mcp_server:mcp_server"
repository-manager-agent = "repository_manager.agent_server:agent_server"

[tool.setuptools.package-data]
repository_manager = ["mcp_config.json", "workspace.yml", "AGENTS.md"]

[tool.uv]
managed = true

[tool.setuptools]
include-package-data = true

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true

[tool.setuptools.package-data]
repository_manager = [ "mcp_config.json", "workspace.yml", "AGENTS.md", "agent_data/*", "agent_data/**/*",]

[tool.ruff.lint]
select = [ "E", "F", "I", "UP", "B",]
ignore = [ "E402", "E501", "B008",]

[tool.uv.sources.agent-utilities]
path = "../../agent-utilities"
editable = true

[tool.setuptools.packages.find]
where = [ ".",]
