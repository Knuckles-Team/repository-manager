[build-system]
requires = ["setuptools>=80.9.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "repository-manager"
version = "1.3.51"
description = "Manage your git projects"
readme = "README.md"
authors = [{ name = "Audel Rouhi", email = "knucklessg1@gmail.com" }]
license = { text = "MIT" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: Public Domain",
    "Environment :: Console",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3"]
requires-python = ">=3.10"
dependencies = [
    "agent-utilities[mcp]>=0.2.31"]

[project.optional-dependencies]
mcp = [
    "agent-utilities[mcp]>=0.2.31"]

agent = [
    "agent-utilities[agent,logfire]>=0.2.31",
    "pre-commit>=4.5.1",
    "bump2version>=1.0.1"]

all = [
    "repository-manager[agent]>=1.3.14"]

[project.scripts]
repository-mcp = "repository_manager.mcp_server:mcp_server"

[tool.setuptools.package-data]
repository_manager = ["mcp_config.json", "workspace.yml", "AGENTS.md", "agent_data/*", "agent_data/**/*"]

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools]
include-package-data = true
